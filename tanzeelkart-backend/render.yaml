services:
  - type: web
    name: tanzeelkart-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: APP_NAME
        value: TanzeelKart
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: tanzeelkart-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: tanzeelkart-db
    databaseName: tanzeelkart
    user: tanzeelkart_user